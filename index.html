<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastDrop - للرفع السريع</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #e0f7fa, #e8f5e9); 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 90%;
            max-width: 450px;
        }
        h1 { color: #000; font-size: 3rem; margin-bottom: 10px; font-weight: bold; }
        p { color: #555; margin-bottom: 30px; font-size: 1.1rem; }
        input { margin: 20px 0; display: block; width: 100%; padding: 10px; border: 1px dashed #2e7d32; border-radius: 5px; }
        button { 
            background-color: #2e7d32; 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1.1rem;
            transition: 0.3s;
        }
        button:hover { background-color: #1b5e20; }
    </style>
</head>
<body>
    <div class="container">
        <h1>FastDrop</h1>
        <p>ارفع ملفاتك، شاركها فوراً، بكل سرعة وسهولة.</p>
        <input type="file" id="fileInput">
        <button onclick="alert('جاري تجهيز ميزة الرفع السريع!')">رفع الملف</button>
    </div>
</body>
</html>

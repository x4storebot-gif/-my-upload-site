<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مركز الرفع</title>
</head>
<body>
    <h1>ارفع ملفك هنا</h1>
    <input type="file" id="fileInput">
    <button onclick="upload()">رفع</button>
    <p id="result"></p>

    <script>
        async function upload() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const result = document.getElementById('result');

            if (!file) return alert("اختر ملفاً أولاً");

            result.innerText = "جاري الرفع...";
            const formData = new FormData();
            formData.append("file", file);

            const response = await fetch("https://api.gofile.io/getContent", { method: "POST", body: formData }); // سنطور هذا لاحقاً
            result.innerText = "تم الرفع! (قيد التطوير)";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastDrop</title>
    <style>
        :root { --bg: linear-gradient(135deg, #e0f7fa, #e8f5e9); --card: white; --text: #000; --menu-bg: white; }
        .dark-mode { --bg: #121212; --card: #1e1e1e; --text: #fff; --menu-bg: #333; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; margin: 0; padding: 20px; text-align: center; display: flex; flex-direction: column; min-height: 100vh; }
        .container { background: var(--card); padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        
        /* تصميم أيقونة الثلاث خطوط */
        .settings-container { position: absolute; top: 20px; right: 20px; z-index: 1000; }
        .settings-icon { cursor: pointer; font-size: 30px; line-height: 1; }
        
        /* القائمة الجانبية (أقل من نصف الشاشة) */
        .settings-menu { 
            display: none; background: var(--menu-bg); padding: 20px; border-radius: 15px 0 0 15px; 
            position: fixed; top: 0; right: 0; width: 40%; height: 100%; box-shadow: -5px 0 15px rgba(0,0,0,0.2);
            z-index: 2000; text-align: left;
        }
        .settings-menu button { 
            display: block; width: 100%; cursor: pointer; background: #f0f0f0; border: none; padding: 15px; 
            border-radius: 8px; font-weight: bold; margin-bottom: 10px; color: #2e7d32; text-align: center;
        }
        
        img { width: 220px; margin-bottom: 10px; }
        .file-upload-btn { background: #eee; border: 2px dashed #2e7d32; padding: 20px; border-radius: 10px; cursor: pointer; display: block; margin: 30px 0; color: #555; font-weight: bold; }
        #fileInput { display: none; }
        .action-btn { background-color: #2e7d32; color: white; border: none; padding: 20px 50px; border-radius: 10px; cursor: pointer; font-size: 1.3rem; width: 100%; }
        #previewContainer { margin: 15px 0; display: none; text-align: left; font-size: 0.8rem; }
        .loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); color: white; align-items: center; justify-content: center; z-index: 3000; }
        #progress { width: 100%; height: 15px; background: #ddd; border-radius: 10px; margin: 30px 0; overflow: hidden; display: none; }
        #bar { width: 0%; height: 100%; background: #2e7d32; }
    </style>
</head>
<body>

    <div class="loader" id="loader"><h1>Uploading...</h1></div>

    <div class="settings-container">
        <div class="settings-icon" onclick="toggleMenu()">☰</div>
        <div id="menu" class="settings-menu">
            <h3 style="text-align: center;">Menu</h3>
            <button onclick="alert('Login functionality coming soon')">Account / Login</button>
            <button id="themeBtn" onclick="toggleTheme()">Dark Mode</button>
            <button onclick="window.open('https://t.me/fastdrop_support')">Help & Support</button>
            <button onclick="toggleMenu()" style="background:#ff5252; color:white;">Close</button>
        </div>
    </div>

    <div class="container">
        <img src="FD.png" alt="Logo">
        <h1>FastDrop</h1>
        <p>Upload simply, share in seconds.</p>
        
        <label for="fileInput" class="file-upload-btn" id="fileLabel">Choose File</label>
        <input type="file" id="fileInput" multiple onchange="handleFile()"> 
        
        <div id="previewContainer">
            <div id="fileInfo"></div>
        </div>

        <button class="action-btn" onclick="uploadFile()">Upload File</button>
        <div id="progress"><div id="bar"></div></div>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('menu');
            menu.style.display = (menu.style.display === 'block' ? 'none' : 'block');
        }
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            document.getElementById('themeBtn').innerText = document.body.classList.contains('dark-mode') ? "Light Mode" : "Dark Mode";
        }
        function handleFile() {
            const input = document.getElementById('fileInput');
            const file = input.files[0];
            if (file) {
                document.getElementById('fileLabel').innerText = file.name;
                document.getElementById('previewContainer').style.display = 'block';
                const size = (file.size / 1024 / 1024).toFixed(2) + ' MB';
                document.getElementById('fileInfo').innerText = `Type: ${file.type.split('/')[1] || 'File'} | Size: ${size}`;
            }
        }
        function uploadFile() {
            if(!document.getElementById('fileInput').files.length) return alert("Please select a file first");
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('progress').style.display = 'block';
            let width = 0;
            let interval = setInterval(() => {
                if (width >= 100) { 
                    clearInterval(interval); 
                    document.getElementById('loader').style.display = 'none';
                    alert("Upload Complete! Link ready to share."); 
                } else { width++; document.getElementById('bar').style.width = width + '%'; }
            }, 30);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastDrop</title>
    <style>
        :root { --bg: linear-gradient(135deg, #e0f7fa, #e8f5e9); --card: white; --text: #000; }
        .dark-mode { --bg: #121212; --card: #1e1e1e; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; margin: 0; padding: 20px; text-align: center; }
        .container { background: var(--card); padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        
        .settings-container { position: absolute; top: 20px; right: 20px; text-align: left; }
        .settings-icon { cursor: pointer; font-size: 30px; }
        /* القائمة تظهر بوضوح الآن */
        .settings-menu { display: none; background: #a5d6a7; padding: 10px; border-radius: 10px; margin-top: 5px; min-width: 120px; }
        .settings-menu button { display: block; width: 100%; margin-bottom: 5px; cursor: pointer; background: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; }
        
        img { width: 200px; margin-bottom: 10px; }
        
        /* زر اختيار الملف يظهر بالإنجليزية */
        input[type="file"] { margin: 30px 0; display: block; width: 100%; padding: 20px; border: 2px dashed #2e7d32; border-radius: 10px; font-size: 1.1rem; color: #000; }
        button { background-color: #2e7d32; color: white; border: none; padding: 20px 50px; border-radius: 10px; cursor: pointer; font-size: 1.3rem; width: 100%; transition: 0.3s; }
        button:hover { background-color: #1b5e20; }
        
        #progress { width: 100%; height: 15px; background: #ddd; border-radius: 10px; margin: 30px 0; overflow: hidden; display: none; }
        #bar { width: 0%; height: 100%; background: #2e7d32; }
    </style>
</head>
<body>

    <div class="settings-container">
        <div class="settings-icon" onclick="toggleMenu()">⚙️</div>
        <div id="menu" class="settings-menu">
            <button id="themeBtn" onclick="toggleTheme()">Dark Mode</button>
            <button onclick="alert('Support: contact@fastdrop.com')">Support</button>
        </div>
    </div>

    <div class="container">
        <img src="FD.png" alt="Logo">
        <h1>FastDrop</h1>
        <p>Upload simply, share in seconds.</p>
        
        <input type="file" id="fileInput">
        <button onclick="uploadFile()">Upload File</button>
        
        <div id="progress"><div id="bar"></div></div>
    </div>

    <footer style="margin-top: 40px; opacity: 0.7;">© 2026 FastDrop</footer>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('menu');
            menu.style.display = (menu.style.display === 'block' ? 'none' : 'block');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('themeBtn');
            btn.innerText = document.body.classList.contains('dark-mode') ? "Light Mode" : "Dark Mode";
        }

        function uploadFile() {
            document.getElementById('progress').style.display = 'block';
            let width = 0;
            let interval = setInterval(() => {
                if (width >= 100) { clearInterval(interval); alert("Upload Complete!"); }
                else { width++; document.getElementById('bar').style.width = width + '%'; }
            }, 30);
        }
    </script>
</body>
</html>
